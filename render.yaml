# Render Blueprint Specification for OTT Platform
# Deploy database, redis cache, backend API, and worker with one click.
# Learn more at: https://render.com/docs/blueprints

envVarGroups:
  - name: ott-shared-secrets
    envVars:
      - key: WORKER_SECRET
        generateValue: true # Generates a single secure random worker communications secret shared by both services

services:
  # 1. Express API Backend Web Service
  - type: web
    name: ott-api
    runtime: node
    plan: free
    buildCommand: npm install && npm install --prefix server
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # User must input their MongoDB connection URI (e.g., MongoDB Atlas)
      - key: JWT_SECRET
        generateValue: true # Generates a secure random 256-bit JWT secret automatically
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ott-redis
          property: connectionString
      - key: CLIENT_URL
        sync: false # Input Vercel Frontend URL (e.g., https://ott-platform.vercel.app)
      - key: CORS_ORIGINS
        sync: false # Input Vercel Frontend URL for CORS permissions
      - key: API_URL
        sync: false # Render external Web Service URL (e.g., https://ott-api.onrender.com)
      - fromGroup: ott-shared-secrets

  # 2. BullMQ Transcoding Background Worker
  - type: worker
    name: ott-transcoder
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node workers/transcode/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ott-redis
          property: connectionString
      - key: API_URL
        value: http://ott-api:10000
      - fromGroup: ott-shared-secrets

  # 3. Managed Redis Instance
  - type: keyvalue
    name: ott-redis
    plan: free
    ipAllowList: [] # Restricts access to internal services only for enhanced security
